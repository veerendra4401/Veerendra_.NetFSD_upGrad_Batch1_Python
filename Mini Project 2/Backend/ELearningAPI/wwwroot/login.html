<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Learning Platform</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Rm34U+9xEcqXGjtB4xqBQ8E6jfNWktmlDzvEmecXLPbjVszW64bkP0pRI8hGGcJp" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-pages">
    <header>
        <div class="container">
            <h1>E-Learning Platform</h1>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <div class="course-card">
                <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
                <form id="loginForm">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; margin-top: 0.5rem;">
                    </div>
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label for="password">Password</label>
                        <input type="password" id="password" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; margin-top: 0.5rem;">
                    </div>
                    <div id="loginError" class="error" style="display: none; margin-bottom: 1rem;"></div>
                    <button type="submit" class="btn" style="width: 100%;">Login</button>
                </form>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 E-Learning Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
